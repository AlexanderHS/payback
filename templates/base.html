<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payback{% block title_extra %}{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            {% if user and '@' in user %}
            <a href="{{ url_for('dashboard') }}" class="nav-brand">Payback</a>
            {% else %}
            <a href="{{ url_for('landing') }}" class="nav-brand">Payback</a>
            {% endif %}
            <div class="nav-links">
                {% if user and '@' in user %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('new_project') }}">+ New</a>
                <a href="{{ url_for('sharing') }}">Sharing</a>
                <a href="{{ url_for('settings') }}">Settings</a>
                <a href="{{ url_for('manage_keys') }}">API Keys</a>
                {% endif %}
                <a href="{{ url_for('docs') }}">Docs</a>
                {% if user and '@' in user %}
                <div class="user-menu">
                    <button type="button" class="user-menu-trigger" aria-haspopup="menu" aria-expanded="false">
                        <span class="user-menu-email">{{ user }}</span>
                    </button>
                    <div class="user-menu-popover" role="menu">
                        <a href="/oauth2/sign_out?rd=/" class="user-menu-item" role="menuitem">Sign out</a>
                    </div>
                </div>
                {% else %}
                <a href="{{ url_for('dashboard') }}">Sign in</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
    // Click-to-toggle for the user menu (works on touch and keyboard).
    // CSS handles hover-to-open on devices that have a real pointer.
    (function () {
        document.querySelectorAll('.user-menu').forEach(function (menu) {
            var trigger = menu.querySelector('.user-menu-trigger');
            if (!trigger) return;
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                var open = menu.classList.toggle('open');
                trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
            });
            document.addEventListener('click', function (e) {
                if (!menu.contains(e.target)) {
                    menu.classList.remove('open');
                    trigger.setAttribute('aria-expanded', 'false');
                }
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    menu.classList.remove('open');
                    trigger.setAttribute('aria-expanded', 'false');
                }
            });
        });
    })();
    </script>
</body>
</html>
